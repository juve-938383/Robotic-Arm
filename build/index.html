<!DOCTYPE html>
<html lang="en">
  <head>


    <meta charset="utf-8">
    <title>Robot Arm</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        grid-template-columns: 1fr 320px;
        background: #2b2b2b;
        color: #ffffff;

    }

    #threejs-container {
        overflow: hidden;
    }

    #controls {
        background: #363636;
        padding: 20px;
        overflow-y: auto;
    }
    </style>
    <script type="module" crossorigin src="./assets/index-BQdnzpy2.js"></script>
  </head>
  <body>
    <div id="threejs-container"></div>
    <div id="controls">
      <h3>Controls</h3>
      <div class="control">
        <p>Animation Speed</p>
        <input id="object-speed" type="range" min="1" max="5" value="1"></input>
      </div>
      <div class="control">

        <button id="stop" type="button">Stop Animation</button>
      </div>
      <div class="control">
        <button id="rotate-camera" type="button">Auto Rotate Camera</button>
      </div>
      <div class="control">
        <p>Rotation per Seconds</p>
        <input id="rotate-speed" type="range" min="1" max="5" value="2" disabled></input>
      </div>
      <div class="control">
        <p>Tray Texture</p>
        <input type="radio" id="tray_tex1" name="tray_texture" value="metal" checked>
        <label for="tray_tex1">Metal</label><br>
        <input type="radio" id="tray_tex2" name="tray_texture" value="brick">
        <label for="tray_tex2">Brick</label><br>
        <input type="radio" id="tray_tex3" name="tray_texture" value="concrete">
        <label for="tray_tex3">Patterned</label>
      </div>
      <div class="control">
        <p>Ground Texture</p>
        <input type="radio" id="ground_tex1" name="ground_texture" value="tiles">
        <label for="ground_tex1">Tiles</label><br>
        <input type="radio" id="ground_tex2" name="ground_texture" value="dark" checked>
        <label for="ground_tex2">Smooth</label><br>
        <input type="radio" id="ground_tex3" name="ground_texture" value="wood">
        <label for="ground_tex3">Wood</label>
      </div>
      
    </div>
    
  </body>
</html>
